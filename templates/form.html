<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodata</title>
</head>
<body>
 <!-- inline css -->
  <h1 style="color:#a80fe4; 
  font-size:50px; 
  font-style:italic;
  text-align: center;
  "align="center">Biodata</h1>
  
<!-- external css -->
    <style>
      body {
        background-color: linen;
      } 

      form {
      max-width: 600px;
      margin: auto;
      padding: 20px;
      border: 2px solid #ccc;
      background-color: #fff;
      border-radius: 10px;
    }
      </style>
 
    <form action="/submit" method="post" enctype="multipart/form-data" autocomplete="off">
      <label for="fname">First name:</label>
      <input type="text" id="fname" name="fname" value=""><br><br>

      <label for ="lname">Last name:</label>
      <input type="text" id="lname" name="lname" value="" ><br><br>

      <label for ="address">Address:</label>
      <textarea type="text" id ="address" name="address" value="" ></textarea><br><br>

      <label for="date">Date of Birth:</label>
      <input type="date" id="date" name="date" value="" /><br><br>

      <label for ="phone">Phone Number:</label>
      <input type="number" id ="phone" name="phone" value="" /><br><br>

      <label for ="email">Email:</label>
      <input type="email" id="email" name="email" value="" /><br><br>

      <label for ="gender">Gender:</label>
      <input type="radio" id ="gender" name="gender" value="male" /> Male
      <input type="radio" id ="gender" name="gender" value="female" /> Female<br><br>

      <label for ="photo">Upload photo:</label>
      <input type="file" id ="photo" name="photo" value="" /><br><br>

      <label for="hobbies">Hobbies:</label>
      <input type="checkbox" id ="hobbies" name="hobbies" value="Reading" /> Reading
      <input type="checkbox" id ="hobbies" name="hobbies" value="Playing" /> Playing
      <input type="checkbox" id ="hobbies" name="hobbies" value="Travelling" /> Sleeping
      <input type="checkbox" id ="hobbies" name="hobbies" value="Coding" /> Coding
      <input type="checkbox" id ="hobbies" name="hobbies" value="Dancing" /> Dancing <br><br>
        
      <input type="submit" value="Submit" />
      <input type="reset" value="Reset" />
      <input type="button" value="Cancel" />
      </form>
  
</body>
</html>
