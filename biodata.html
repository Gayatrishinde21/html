<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodata</title>
    <style>
        body {
            background-color: linen;
        }
        form {
            max-width: 600px;
            margin: auto;
            padding: 20px;
            border: 2px solid #ccc;
            background-color: #fff;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h1 style="color:#a80fe4; font-size:50px; font-style:italic; text-align:center;">Biodata</h1>
    <form id="biodataForm" action="/save_data" method="post" enctype="multipart/form-data" autocomplete="off">
        <label for="fname">First name:</label>
        <input type="text" id="fname" name="fname" value=""><br><br>

        <label for="lname">Last name:</label>
        <input type="text" id="lname" name="lname" value=""><br><br>

        <label for="address">Address:</label>
        <textarea id="address" name="address"></textarea><br><br>

        <label for="date">Date of Birth:</label>
        <input type="date" id="date" name="date" value=""><br><br>

        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone" value=""><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" value=""><br><br>

        <label for="gender">Gender:</label>
        <input type="radio" id="male" name="gender" value="male"> Male
        <input type="radio" id="female" name="gender" value="female"> Female<br><br>

        <label for="photo">Upload photo:</label>
        <input type="file" id="photo" name="photo" accept="image/*"><br><br>

        <label>Hobbies:</label><br>
        <input type="checkbox" id="reading" name="hobbies" value="Reading"> Reading
        <input type="checkbox" id="playing" name="hobbies" value="Playing"> Playing
        <input type="checkbox" id="sleeping" name="hobbies" value="Sleeping"> Sleeping
        <input type="checkbox" id="coding" name="hobbies" value="Coding"> Coding
        <input type="checkbox" id="dancing" name="hobbies" value="Dancing"> Dancing<br><br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
        <input type="button" value="Cancel" onclick="window.location.href='/'">
    </form>

    <script>
        const form = document.getElementById("biodataForm");
        form.addEventListener("submit", function (e) {
            e.preventDefault();
            const formData = new FormData(form);
            fetch("/save_data", {
                method: "POST",
                body: formData
            })
                .then((res) => res.text())
                .then((data) => alert(data))
                .catch((err) => alert("Error submitting form: " + err.message));
        });
    </script>
</body>
</html>
